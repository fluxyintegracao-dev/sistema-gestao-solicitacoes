{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel auth-panel-login">
  <div class="auth-heading">
    <span class="auth-kicker">Recuperação de acesso</span>
    <h1 class="with-icon">
      <svg class="ui-icon"><use href="#i-key"></use></svg>
      <span>Esqueci minha senha</span>
    </h1>
    <p class="hint">Informe seu email e enviaremos um link para redefinir sua senha.</p>
  </div>
  {% if msg %}
  <p class="notice {{ 'success' if msg_type == 'success' else ('error' if msg_type == 'error' else '') }}">{{ msg }}</p>
  {% endif %}
  <form method="post" class="auth-form auth-form-login">
    <input type="hidden" name="next" value="{{ next_url or '' }}" />
    <div class="field">
      <label for="email">Email cadastrado</label>
      <input type="email" id="email" name="email" placeholder="voce@empresa.com" required autocomplete="email" autofocus />
    </div>
    <button type="submit" class="primary with-icon">
      <svg class="ui-icon"><use href="#i-mail"></use></svg>
      <span>Enviar link de redefinição</span>
    </button>
  </form>
  <div class="auth-links">
    <a class="card auth-link with-icon" href="{{ url_for('login', next=next_url or '') }}">
      <svg class="ui-icon"><use href="#i-login"></use></svg>
      <span>Voltar para entrar</span>
    </a>
    {% if allow_signup %}
    <a class="card auth-link with-icon" href="{{ url_for('signup', next=next_url or '') }}">
      <svg class="ui-icon"><use href="#i-user-plus"></use></svg>
      <span>Criar nova conta</span>
    </a>
    {% endif %}
  </div>
</section>
{% endblock %}
