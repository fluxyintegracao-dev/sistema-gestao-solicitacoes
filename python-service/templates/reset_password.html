{% extends "base.html" %}
{% block content %}
<section class="panel auth-panel auth-panel-login">
  <div class="auth-heading">
    <span class="auth-kicker">Seguranca da conta</span>
    <h1 class="with-icon">
      <svg class="ui-icon"><use href="#i-key"></use></svg>
      <span>Redefinir senha</span>
    </h1>
    <p class="hint">Crie uma nova senha para concluir o acesso.</p>
  </div>
  {% if msg %}
  <p class="notice {{ 'success' if msg_type == 'success' else ('error' if msg_type == 'error' else '') }}">{{ msg }}</p>
  {% endif %}

  {% if token_valid %}
  <form method="post" class="auth-form auth-form-login">
    <input type="hidden" name="token" value="{{ token or '' }}" />
    <div class="field">
      <label for="senha">Nova senha</label>
      <input type="password" id="senha" name="senha" minlength="6" required autocomplete="new-password" autofocus />
    </div>
    <div class="field">
      <label for="senha_confirm">Confirmar nova senha</label>
      <input type="password" id="senha_confirm" name="senha_confirm" minlength="6" required autocomplete="new-password" />
    </div>
    <button type="submit" class="primary with-icon">
      <svg class="ui-icon"><use href="#i-key"></use></svg>
      <span>Salvar nova senha</span>
    </button>
  </form>
  {% endif %}

  <div class="auth-links">
    <a class="card auth-link with-icon" href="{{ url_for('login') }}">
      <svg class="ui-icon"><use href="#i-login"></use></svg>
      <span>Ir para login</span>
    </a>
    <a class="card auth-link with-icon" href="{{ url_for('forgot_password') }}">
      <svg class="ui-icon"><use href="#i-mail"></use></svg>
      <span>Solicitar novo link</span>
    </a>
  </div>
</section>
{% endblock %}
