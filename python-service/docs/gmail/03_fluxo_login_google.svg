<svg xmlns="http://www.w3.org/2000/svg" width="1260" height="760" viewBox="0 0 1260 760">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .label { font: 600 20px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .text { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #243b53; }
      .box { fill: #f0f4f8; stroke: #486581; stroke-width: 3; rx: 14; }
      .google { fill: #eef4ff; stroke: #1f3c88; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="10" refX="10" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,10 L10,5 z" fill="#334e68" />
    </marker>
  </defs>

  <rect width="1260" height="760" fill="#fffdf7" />
  <text x="60" y="70" class="title">Fluxo: Login com Google (OpenID Connect)</text>

  <rect x="80" y="130" width="260" height="120" class="box" />
  <text x="110" y="175" class="label">Usuario</text>
  <text x="110" y="210" class="text">Clica "Entrar com Google"</text>

  <rect x="440" y="90" width="360" height="200" class="box" />
  <text x="470" y="135" class="label">Seu Flask</text>
  <text x="470" y="170" class="text">/login/google gera state</text>
  <text x="470" y="200" class="text">redireciona para Google Auth</text>
  <text x="470" y="230" class="text">scope: openid email profile</text>

  <rect x="890" y="120" width="290" height="140" class="box google" />
  <text x="920" y="165" class="label">Google Identity</text>
  <text x="920" y="200" class="text">Tela de consentimento/login</text>
  <text x="920" y="230" class="text">retorna code + state</text>

  <rect x="440" y="360" width="360" height="240" class="box" />
  <text x="470" y="405" class="label">Callback /auth/google/callback</text>
  <text x="470" y="440" class="text">1) valida state</text>
  <text x="470" y="470" class="text">2) troca code por access_token</text>
  <text x="470" y="500" class="text">3) chama userinfo endpoint</text>
  <text x="470" y="530" class="text">4) login/cria usuario local</text>

  <rect x="890" y="410" width="290" height="160" class="box google" />
  <text x="920" y="455" class="label">Google APIs</text>
  <text x="920" y="490" class="text">token_endpoint</text>
  <text x="920" y="520" class="text">userinfo_endpoint</text>

  <line x1="340" y1="190" x2="430" y2="190" stroke="#334e68" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="800" y1="190" x2="880" y2="190" stroke="#334e68" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="1035" y1="260" x2="800" y2="420" stroke="#334e68" stroke-width="4" marker-end="url(#arrow)" />
  <line x1="800" y1="490" x2="880" y2="490" stroke="#334e68" stroke-width="4" marker-end="url(#arrow)" />

  <text x="80" y="700" class="text">No seu codigo: rotas em app.py perto das linhas 2327-2472.</text>
</svg>
