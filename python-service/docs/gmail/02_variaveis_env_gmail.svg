<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <style>
      .title { font: 700 34px 'Segoe UI', Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 600 22px 'Segoe UI', Arial, sans-serif; fill: #1f3c88; }
      .text { font: 500 17px 'Consolas', 'Courier New', monospace; fill: #243b53; }
      .hint { font: 500 16px 'Segoe UI', Arial, sans-serif; fill: #334e68; }
      .box { fill: #f8f9fb; stroke: #486581; stroke-width: 2.5; rx: 14; }
      .ok { fill: #e6fffa; stroke: #2c7a7b; }
      .warn { fill: #fff5f5; stroke: #c53030; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#fffdf7" />
  <text x="60" y="70" class="title">Variaveis de ambiente para Gmail no seu app</text>

  <rect x="60" y="110" width="1080" height="420" class="box" />
  <text x="90" y="155" class="subtitle">.env / Render / Railway (exemplo recomendado)</text>

  <text x="90" y="205" class="text">SMTP_HOST=smtp.gmail.com</text>
  <text x="90" y="245" class="text">SMTP_PORT=587</text>
  <text x="90" y="285" class="text">SMTP_USERNAME=seuemail@gmail.com</text>
  <text x="90" y="325" class="text">SMTP_PASSWORD=senha_de_app_16_digitos</text>
  <text x="90" y="365" class="text">SMTP_FROM_EMAIL=seuemail@gmail.com</text>
  <text x="90" y="405" class="text">SMTP_USE_TLS=true</text>
  <text x="90" y="445" class="text">SMTP_USE_SSL=false</text>

  <rect x="60" y="560" width="520" height="150" class="box ok" />
  <text x="90" y="605" class="subtitle">Com isso, funciona</text>
  <text x="90" y="640" class="hint">/esqueci-senha -> envio de link por email</text>
  <text x="90" y="670" class="hint">Sem expor senha real da conta Google</text>

  <rect x="620" y="560" width="520" height="150" class="box warn" />
  <text x="650" y="605" class="subtitle">Erros comuns</text>
  <text x="650" y="640" class="hint">- Usar senha normal da conta (vai falhar)</text>
  <text x="650" y="670" class="hint">- TLS e SSL ligados ao mesmo tempo</text>

  <text x="700" y="510" class="hint">No seu app, essas variaveis sao lidas perto das linhas 111-117.</text>
</svg>
