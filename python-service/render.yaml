services:
  - type: web
    name: csc-insumos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    healthCheckPath: /login
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.8
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: MASTER_ADMIN_EMAIL
        value: mangefestekaua@gmail.com
      - key: MASTER_ADMIN_PASSWORD
        sync: false
      - key: AUTH_ALLOW_PUBLIC_SIGNUP
        value: "true"
      - key: PASSWORD_RESET_TOKEN_MINUTES
        value: "30"
      - key: SMTP_HOST
        value: smtp-relay.brevo.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_USE_TLS
        value: "true"
      - key: SMTP_USE_SSL
        value: "false"
